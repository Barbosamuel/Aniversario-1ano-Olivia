<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aniversário 1 Ano Olívia 🎉</title>

  <!-- Open Graph (WhatsApp, Facebook, etc) -->
  <meta property="og:title" content="Aniversário de 1 Ano da Olívia 🎉">
  <meta property="og:description" content="Você está convidado para comemorar esse momento especial conosco! 💖">
  <meta property="og:image" content="https://barbosamuel.github.io/Aniversario-1ano-Olivia/assets/preview.png">
  <meta property="og:url" content="https://barbosamuel.github.io/Aniversario-1ano-Olivia/">
  <meta property="og:type" content="website">

  <!-- Twitter (opcional, mas recomendado) -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Aniversário de 1 Ano da Olivia 🎉">
  <meta name="twitter:description" content="Você está convidado para comemorar esse momento especial conosco! 💖">
  <meta name="twitter:image" content="https://barbosamuel.github.io/Aniversario-1ano-Olivia/assets/preview.png">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- Música -->
   <audio id="bg-music" loop>
    <source src="assets/MinhaPaz.mp3" type="audio/mpeg">
  </audio>
  
  <audio id="open-sound">
    <source src="assets/MagicChime.mp3" type="audio/mpeg">
  </audio>

  <!-- TELA 1 -->
  <section id="tela1" class="tela ativa">
    <img src="assets/tela1.png" class="media">
    <button class="area area-abrir" onclick="abrirConvite()"></button>
  </section>

  <!-- TELA 2 -->
  <section id="tela2" class="tela">
    <video class="media" id="video2" autoplay muted playsinline>
      <source src="assets/tela2.mp4" type="video/mp4">
    </video>
  </section>

  <!-- TELA 3 -->
  <section id="tela3" class="tela">
    <video class="media" autoplay muted loop playsinline>
      <source src="assets/tela3.mp4" type="video/mp4">
    </video>

    <div class="contador" id="contador"></div>

    <div class="areas-botoes">
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSe4CqGrIl2k3zMmTyd9MqphWRWIwXuzMXq1noNEW51Jq_i5UA/viewform?usp=header" target="_blank" class="area circulo"></a>
      <a href="https://maps.app.goo.gl/jEGpRhF978vjguDN7" target="_blank" class="area circulo"></a>
      <button class="area circulo" onclick="trocarTela('tela4')"></button>
    </div>
  </section>

  <!-- TELA 4 -->
  <section id="tela4" class="tela">
    <video class="media" autoplay muted loop playsinline>
      <source src="assets/tela4.mp4" type="video/mp4">
    </video>

    <button class="area voltar" onclick="trocarTela('tela3')"></button>
  </section>

</div>

<script>
function abrirConvite() {
  const som = document.getElementById("open-sound");
  const music = document.getElementById("bg-music");
  const video = document.getElementById("video2");

  // 🔔 som de abertura
  som.currentTime = 0;
  som.volume = 1.0;

  som.play().then(() => {

    // 🎵 música começa depois do clique (garantido)
    music.currentTime = 0;
    music.volume = 0.4;
    music.play().catch(() => {});

    // troca tela
    trocarTela('tela2');

    // 🎬 inicia vídeo
    video.currentTime = 0;
    video.muted = true;

    video.play().then(() => {
      // quando terminar → tela 3
      video.onended = () => {
        trocarTela('tela3');
      };
    }).catch(() => {
      console.log("Erro ao iniciar vídeo");
    });

  }).catch(() => {
    console.log("Erro ao tocar som");
  });
}
</script>

</body>
</html>
