<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convite</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- Música -->
  <audio id="bg-music" loop>
    <source src="assets/MinhaPaz.mp3" type="audio/mpeg">
  </audio>

  <!-- TELA 1 -->
  <section id="tela1" class="tela ativa">
    <img src="assets/tela1.jpg" class="media">
    <button class="area area-abrir" onclick="trocarTela('tela2')"></button>
  </section>

  <!-- TELA 2 -->
  <section id="tela2" class="tela">
    <video class="media" id="video2" muted playsinline>
      <source src="assets/tela2.mp4" type="video/mp4">
    </video>
  </section>

  <!-- TELA 3 -->
  <section id="tela3" class="tela">
    <video class="media" autoplay muted loop playsinline>
      <source src="assets/tela3.mp4" type="video/mp4">
    </video>

    <div class="contador" id="contador"></div>

    <div class="areas-botoes">
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSe4CqGrIl2k3zMmTyd9MqphWRWIwXuzMXq1noNEW51Jq_i5UA/viewform?usp=header" target="_blank" class="area circulo"></a>
      <a href="https://maps.app.goo.gl/jEGpRhF978vjguDN7" target="_blank" class="area circulo"></a>
      <button class="area circulo" onclick="trocarTela('tela4')"></button>
    </div>
  </section>

  <!-- TELA 4 -->
  <section id="tela4" class="tela">
    <video class="media" autoplay muted loop playsinline>
      <source src="assets/tela4.mp4" type="video/mp4">
    </video>

    <button class="area voltar" onclick="trocarTela('tela3')"></button>
  </section>

</div>

<script>
function trocarTela(id) {
  document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
  document.getElementById(id).classList.add('ativa');

  // tocar vídeo da tela 2 ao entrar
  if (id === 'tela2') {
    const video = document.getElementById("video2");
    video.play();

    video.onended = () => {
      trocarTela('tela3');
    };
  }
}

// música ao primeiro clique
document.body.addEventListener('click', function () {
  const music = document.getElementById("bg-music");
  music.play().catch(() => {});
}, { once: true });

/* CONTADOR */
const dataEvento = new Date("2026-08-15T18:00:00");

function atualizarContador() {
  const agora = new Date();
  const diff = dataEvento - agora;

  if (diff <= 0) {
    document.getElementById("contador").innerHTML = "🎉 É hoje!";
    return;
  }

  const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
  const horas = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutos = Math.floor((diff / (1000 * 60)) % 60);
  const segundos = Math.floor((diff / 1000) % 60);

  document.getElementById("contador").innerHTML =
    `${dias}d ${horas}h ${minutos}m ${segundos}s`;
}

setInterval(atualizarContador, 1000);
atualizarContador();
</script>

</body>
</html>
